# ──────────────────────────────────────────────────────────────────────────
# Merge this [mutmut] section into your project-root setup.cfg.
# These defaults apply when running `mutmut run` directly (without the
# run_mutations.py wrapper).  The wrapper overrides most of these via CLI.
#
# Alternatively, put the equivalent in pyproject.toml (see comments below).
# ──────────────────────────────────────────────────────────────────────────

[mutmut]
paths_to_mutate =
    rl_stack/agent.py,
    rl_stack/model.py,
    rl_stack/buffer.py,
    rl_stack/env_wrapper.py,
    quantum_repeater_sim/repeater.py,
    quantum_repeater_sim/network.py

tests_dir = diagnostics/unittests/

runner = python -m pytest diagnostics/unittests/ -x -q --tb=line --no-header

# ── pyproject.toml equivalent ────────────────────────────────────────────
